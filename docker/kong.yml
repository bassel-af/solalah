_format_version: "3.0"

services:
  - name: auth
    url: http://gotrue:9999
    routes:
      - name: auth-all
        strip_path: true
        paths:
          - /auth/v1/
    plugins:
      - name: cors
        config:
          origins:
            - "*"
          methods:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
            - OPTIONS
          headers:
            - Accept
            - Authorization
            - Content-Type
            - apikey
            - x-client-info
            - x-supabase-api-version
          exposed_headers:
            - Content-Range
          credentials: true
          max_age: 3600
