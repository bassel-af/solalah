_format_version: "3.0"

services:
  - name: auth
    url: http://gotrue:9999
    routes:
      - name: auth-all
        strip_path: true
        paths:
          - /auth/v1/
    plugins:
      - name: cors
        config:
          # Restrict CORS to known origins. Add your production domain here when deployed.
          origins:
            - "http://localhost:4000"
          methods:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
            - OPTIONS
          headers:
            - Accept
            - Authorization
            - Content-Type
            - apikey
            - x-client-info
            - x-supabase-api-version
          exposed_headers:
            - Content-Range
          credentials: true
          max_age: 3600
      - name: rate-limiting
        config:
          policy: local
          minute: 300
          limit_by: ip
          hide_client_headers: false
