# Gynat — Self-hosted Supabase stack
# Usage: cd docker && docker compose up -d
#
# Services:
#   - db: PostgreSQL 15 (application database + GoTrue auth schema)
#   - gotrue: Supabase Auth (GoTrue) — handles login, registration, JWT tokens
#   - kong: API gateway — routes /auth/* to GoTrue
#   - studio: Supabase Studio — admin UI for managing users (dev only)

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: gynat
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  gotrue:
    image: supabase/gotrue:v2.186.0
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:9999:9999"
    environment:
      GOTRUE_API_HOST: "0.0.0.0"
      GOTRUE_API_PORT: "9999"
      API_EXTERNAL_URL: ${API_EXTERNAL_URL:-http://localhost:8000}

      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: "postgresql://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@db:5432/gynat?search_path=auth"

      GOTRUE_SITE_URL: ${GOTRUE_SITE_URL:-http://localhost:4000}
      GOTRUE_URI_ALLOW_LIST: ${GOTRUE_URI_ALLOW_LIST:-http://localhost:4000/**}
      GOTRUE_DISABLE_SIGNUP: "false"

      GOTRUE_JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      GOTRUE_JWT_EXP: "3600"
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated

      # Email auth
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      # SECURITY: Auto-confirm disabled — SMTP must be configured for email
      # verification to work. Without SMTP, users cannot complete signup,
      # which is safer than allowing unverified email addresses.
      GOTRUE_MAILER_AUTOCONFIRM: "false"

      # Google OAuth (disabled by default — set env vars to enable)
      GOTRUE_EXTERNAL_GOOGLE_ENABLED: ${GOOGLE_OAUTH_ENABLED:-false}
      GOTRUE_EXTERNAL_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOTRUE_EXTERNAL_GOOGLE_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOTRUE_EXTERNAL_GOOGLE_REDIRECT_URI: ${API_EXTERNAL_URL:-http://localhost:8000}/auth/v1/callback

      # Phone OTP (infrastructure ready, activation deferred)
      GOTRUE_EXTERNAL_PHONE_ENABLED: "false"
      GOTRUE_SMS_AUTOCONFIRM: "false"

      # SMTP (for password recovery, email verification)
      GOTRUE_SMTP_HOST: ${SMTP_HOST:-}
      GOTRUE_SMTP_PORT: ${SMTP_PORT:-587}
      GOTRUE_SMTP_USER: ${SMTP_USER:-}
      GOTRUE_SMTP_PASS: ${SMTP_PASS:-}
      GOTRUE_SMTP_ADMIN_EMAIL: ${SMTP_SENDER_EMAIL:-noreply@gynat.com}
      GOTRUE_SMTP_SENDER_NAME: ${SMTP_SENDER_NAME:-جينات}
      GOTRUE_MAILER_URLPATHS_INVITE: "/auth/v1/verify"
      GOTRUE_MAILER_URLPATHS_CONFIRMATION: "/auth/v1/verify"
      GOTRUE_MAILER_URLPATHS_RECOVERY: "/auth/v1/verify"
      GOTRUE_MAILER_URLPATHS_EMAIL_CHANGE: "/auth/v1/verify"
      GOTRUE_MAILER_URLPATHS_MAGIC_LINK: "/auth/v1/verify"

      # Email subjects (Arabic — matches RTL templates)
      GOTRUE_MAILER_SUBJECTS_CONFIRMATION: "تأكيد البريد الإلكتروني — جينات"
      GOTRUE_MAILER_SUBJECTS_RECOVERY: "إعادة تعيين كلمة المرور — جينات"
      GOTRUE_MAILER_SUBJECTS_INVITE: "دعوة للانضمام — جينات"
      GOTRUE_MAILER_SUBJECTS_EMAIL_CHANGE: "تأكيد تغيير البريد الإلكتروني — جينات"
      GOTRUE_MAILER_SUBJECTS_MAGIC_LINK: "رابط تسجيل الدخول — جينات"
      GOTRUE_MAILER_SUBJECTS_REAUTHENTICATION: "رمز إعادة التحقق — جينات"

      # Password policy
      GOTRUE_PASSWORD_MIN_LENGTH: "8"
      GOTRUE_PASSWORD_REQUIRED_CHARACTERS: "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ:0123456789"

      # Custom email templates (GoTrue fetches via HTTP; host.docker.internal reaches the host)
      GOTRUE_MAILER_TEMPLATES_RECOVERY: "http://host.docker.internal:4000/templates/recovery.html"
      GOTRUE_MAILER_TEMPLATES_CONFIRMATION: "http://host.docker.internal:4000/templates/confirmation.html"
      GOTRUE_MAILER_TEMPLATES_EMAIL_CHANGE: "http://host.docker.internal:4000/templates/email-change.html"
      GOTRUE_MAILER_TEMPLATES_MAGIC_LINK: "http://host.docker.internal:4000/templates/magic-link.html"

      # Magic link / OTP settings
      GOTRUE_MAILER_OTP_EXP: "3600"
      GOTRUE_RATE_LIMIT_OTP: "60"
      GOTRUE_RATE_LIMIT_EMAIL_SENT: "60"
    depends_on:
      db:
        condition: service_healthy

  kong:
    image: kong/kong:3.9.1
    restart: unless-stopped
    ports:
      # ${KONG_HOST_BIND} lets prod bind to 127.0.0.1:8002 (nginx proxies to
      # it) without conflicting with other docker-proxies on host port 8000.
      # Dev leaves it empty so the default "8000:8000" binds all interfaces.
      - "${KONG_HOST_BIND:-8000}:8000"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_DNS_ORDER: LAST,SRV,A,CNAME
      KONG_PLUGINS: cors,key-auth,acl,rate-limiting
      KONG_LOG_LEVEL: warn
    volumes:
      - ./kong.yml:/etc/kong/kong.yml:ro
    depends_on:
      - gotrue

  studio:
    image: supabase/studio:2026.03.16-sha-5528817
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      HOSTNAME: "::"
      STUDIO_PG_META_URL: "http://pg-meta:8080"
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: gynat
      PG_META_CRYPTO_KEY: ${PG_META_CRYPTO_KEY:?PG_META_CRYPTO_KEY is required}
      DEFAULT_ORGANIZATION_NAME: "Gynat"
      DEFAULT_PROJECT_NAME: "Gynat"
      SUPABASE_URL: "http://kong:8000"
      SUPABASE_PUBLIC_URL: ${API_EXTERNAL_URL:-http://localhost:8000}
      SUPABASE_ANON_KEY: ${ANON_KEY:?ANON_KEY is required}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY:?SERVICE_ROLE_KEY is required}
      AUTH_JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
    depends_on:
      - kong
      - pg-meta

  # Mailpit — local SMTP mail trap for email template testing (dev/test only).
  # Captures all outgoing mail so tests can inspect messages via the HTTP API.
  # SECURITY: bound to 127.0.0.1 only — never expose to the network.
  # Host ports namespaced as 1125/8125 to avoid conflicts with other Mailpit
  # containers on the same machine. Internal container ports remain 1025/8025.
  mailpit:
    image: axllent/mailpit:v1.21
    container_name: gynat-mailpit
    restart: unless-stopped
    ports:
      - "127.0.0.1:1125:1025"
      - "127.0.0.1:8125:8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: "true"
      MP_SMTP_AUTH_ALLOW_INSECURE: "true"
      MP_MAX_MESSAGES: "500"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8025/readyz"]
      interval: 10s
      timeout: 3s
      retries: 5

  pg-meta:
    image: supabase/postgres-meta:v0.95.2
    restart: unless-stopped
    environment:
      PG_META_PORT: "8080"
      PG_META_DB_HOST: db
      PG_META_DB_PORT: "5432"
      PG_META_DB_NAME: gynat
      PG_META_DB_USER: supabase_admin
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      CRYPTO_KEY: ${PG_META_CRYPTO_KEY:?PG_META_CRYPTO_KEY is required}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
